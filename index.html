<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudyFolio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>StudyFolio</h1>
  <div id="timer" class="timer-display">00:00</div>
  <div class="controls">
    <label>Session length:
      <input type="number" id="session-length" min="1" value="25"> minutes
    </label>
    <button id="start">Start</button>
    <button id="pause">Pause</button>
    <button id="reset">Reset</button>
  </div>
  <canvas id="chart" width="600" height="300"></canvas>
  <div class="sound">
    <label for="sound-select">Ambient Sound:</label>
    <select id="sound-select">
      <option value="none">None</option>
      <option value="rain">Rainy Day</option>
      <option value="coffee">Coffee Shop</option>
      <option value="forest">Forest</option>
    </select>
    <button id="sound-toggle">Play</button>
    <input type="range" id="volume" min="0" max="1" step="0.01" value="0.3">
  </div>
  <div class="stats">
    <h2>Stats</h2>
    <p>Total Focus Time: <span id="total-time">0</span> minutes</p>
    <p>Best Session: <span id="best-session">0</span> minutes</p>
  </div>
  <script src="script.js"></script>
</body>
</html>
